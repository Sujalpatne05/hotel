<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6f00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Chef Hat -->
  <g transform="translate(256, 200)">
    <!-- Hat top (puffy part) -->
    <ellipse cx="0" cy="-40" rx="100" ry="60" fill="white" opacity="0.95"/>
    <circle cx="-60" cy="-50" r="45" fill="white" opacity="0.95"/>
    <circle cx="60" cy="-50" r="45" fill="white" opacity="0.95"/>
    <circle cx="-30" cy="-70" r="40" fill="white" opacity="0.95"/>
    <circle cx="30" cy="-70" r="40" fill="white" opacity="0.95"/>
    
    <!-- Hat base -->
    <rect x="-90" y="-20" width="180" height="50" fill="white" opacity="0.95" rx="5"/>
    
    <!-- Hat band detail -->
    <rect x="-90" y="20" width="180" height="8" fill="#f5f5f5" opacity="0.9"/>
  </g>
  
  <!-- RestroHub Text -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">RestroHub</text>
</svg>