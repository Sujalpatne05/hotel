<!DOCTYPE html>
<html>
<head>
    <title>Clear All Cache</title>
</head>
<body>
    <h1>Clearing All Cache...</h1>
    <p id="status">Please wait...</p>
    <script>
        async function clearAllCache() {
            const status = document.getElementById('status');
            
            // Clear service workers
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                    status.innerHTML += '<br>✓ Service worker unregistered';
                }
            }
            
            // Clear all caches
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                for (let cacheName of cacheNames) {
                    await caches.delete(cacheName);
                    status.innerHTML += '<br>✓ Cache deleted: ' + cacheName;
                }
            }
            
            // Clear local storage
            localStorage.clear();
            status.innerHTML += '<br>✓ Local storage cleared';
            
            // Clear session storage
            sessionStorage.clear();
            status.innerHTML += '<br>✓ Session storage cleared';
            
            status.innerHTML += '<br><br><strong>✓ All cache cleared!</strong>';
            status.innerHTML += '<br><br><a href="/">Go to Login Page</a>';
        }
        
        clearAllCache();
    </script>
</body>
</html>
